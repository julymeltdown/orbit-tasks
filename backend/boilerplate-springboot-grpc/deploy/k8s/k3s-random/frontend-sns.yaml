apiVersion: apps/v1
kind: Deployment
metadata:
  name: sns-frontend
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sns-frontend
  template:
    metadata:
      labels:
        app: sns-frontend
    spec:
      containers:
        - name: sns-frontend
          image: ${SNS_FRONTEND_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "28973"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: /gateway
            - name: GATEWAY_PROXY_TARGET
              value: http://api-gateway.boilerplate-random.svc.cluster.local:25429
          ports:
            - name: http
              containerPort: 28973
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sns-frontend
  namespace: boilerplate-random
spec:
  type: NodePort
  selector:
    app: sns-frontend
  ports:
    - name: http
      port: 28973
      targetPort: http
      nodePort: 32612
