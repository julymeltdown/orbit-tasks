spring:
  datasource:
    url: jdbc:h2:mem:post-local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

post:
  persistence:
    mode: jpa
  kafka:
    enabled: false
  events:
    republish:
      enabled: false
