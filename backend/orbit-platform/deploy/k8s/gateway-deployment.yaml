apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: msa-gateway:dev
          ports:
            - containerPort: 8080
          env:
            - name: GATEWAY_AUTH_BASE_URL
              value: http://auth-service:8080
            - name: GATEWAY_JWKS_URL
              value: http://auth-service:8080/.well-known/jwks.json
            - name: GATEWAY_PROFILE_GRPC_TARGET
              value: profile-service:9091
            - name: GATEWAY_FRIEND_GRPC_TARGET
              value: friend-service:9092
            - name: GATEWAY_NOTIFICATION_GRPC_TARGET
              value: notification-service:9093
            - name: GATEWAY_POST_GRPC_TARGET
              value: post-service:9094
            - name: GATEWAY_CORS_ALLOWED_ORIGINS
              value: https://*.infinitefallcult.trade,http://localhost:5174
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
