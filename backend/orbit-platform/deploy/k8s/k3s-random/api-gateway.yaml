apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ${GATEWAY_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: GATEWAY_PORT
              value: "24271"
            - name: GATEWAY_AUTH_GRPC_TARGET
              value: auth-service:28741
            - name: GATEWAY_JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: auth-jwt
                  key: JWT_PUBLIC_KEY_PEM
            - name: GATEWAY_PROFILE_GRPC_TARGET
              value: profile-service:27183
            - name: GATEWAY_FRIEND_GRPC_TARGET
              value: friend-service:29921
            - name: GATEWAY_NOTIFICATION_GRPC_TARGET
              value: notification-service:21463
            - name: GATEWAY_POST_GRPC_TARGET
              value: post-service:29567
            - name: GATEWAY_CORS_ALLOWED_ORIGINS
              value: https://*.infinitefallcult.trade,http://121.130.253.119:32436
          ports:
            - name: http
              containerPort: 24271
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: boilerplate-random
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 24271
      targetPort: http
      nodePort: 32157
