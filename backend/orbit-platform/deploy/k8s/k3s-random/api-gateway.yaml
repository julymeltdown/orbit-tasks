apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ${GATEWAY_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: GATEWAY_PORT
              value: "28080"
            - name: GATEWAY_MULTIPART_MAX_FILE_SIZE
              value: 5MB
            - name: GATEWAY_MULTIPART_MAX_REQUEST_SIZE
              value: 5MB
            - name: GATEWAY_PROFILE_GRPC_MAX_INBOUND_SIZE
              value: 6MB
            - name: GATEWAY_AUTH_GRPC_TARGET
              value: auth-service:29131
            - name: GATEWAY_IDENTITY_GRPC_TARGET
              value: auth-service:29131
            - name: GATEWAY_JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: auth-jwt
                  key: JWT_PUBLIC_KEY_PEM
            - name: GATEWAY_PROFILE_GRPC_TARGET
              value: profile-service:29132
            - name: GATEWAY_FRIEND_GRPC_TARGET
              value: friend-service:29133
            - name: GATEWAY_NOTIFICATION_GRPC_TARGET
              value: notification-service:29134
            - name: GATEWAY_POST_GRPC_TARGET
              value: post-service:29135
            - name: GATEWAY_CORS_ALLOWED_ORIGINS
              value: https://*.infinitefallcult.trade,https://infinitefallcult.trade,https://tasksapi.infinitefallcult.trade,http://121.130.253.119:32436,http://localhost:*,https://localhost:*
          ports:
            - name: http
              containerPort: 28080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: boilerplate-random
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 28080
      targetPort: http
      nodePort: 32157
