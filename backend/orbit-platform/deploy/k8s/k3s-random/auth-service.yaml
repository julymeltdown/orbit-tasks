apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ${AUTH_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: AUTH_EMAIL_STUB
              value: "false"
            - name: AUTH_SEED_ENABLED
              value: "true"
            - name: AUTH_SEED_RESET
              value: "true"
            - name: REDIS_URL
              value: redis://redis:24111
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: auth-smtp
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: auth-smtp
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-smtp
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-smtp
                  key: SMTP_PASSWORD
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: auth-smtp
                  key: SMTP_FROM
            - name: JWT_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: auth-jwt
                  key: JWT_PRIVATE_KEY_PEM
            - name: JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: auth-jwt
                  key: JWT_PUBLIC_KEY_PEM
            - name: SERVER_PORT
              value: "24131"
            - name: GRPC_SERVER_PORT
              value: "29131"
          ports:
            - name: http
              containerPort: 24131
            - name: grpc
              containerPort: 29131
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: boilerplate-random
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 24131
      targetPort: http
    - name: grpc
      port: 29131
      targetPort: grpc
