apiVersion: apps/v1
kind: Deployment
metadata:
  name: friend-service
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: friend-service
  template:
    metadata:
      labels:
        app: friend-service
    spec:
      containers:
        - name: friend-service
          image: ${FRIEND_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: FRIEND_SEED_ENABLED
              value: "true"
            - name: FRIEND_SEED_RESET
              value: "true"
            - name: SERVER_PORT
              value: "24611"
            - name: GRPC_SERVER_PORT
              value: "29921"
            - name: AUTH_JWKS_URL
              value: http://auth-service:21937/.well-known/jwks.json
            - name: SECURITY_INTERNAL_SERVICE_TOKEN
              value: internal-service-token
          ports:
            - name: http
              containerPort: 24611
            - name: grpc
              containerPort: 29921
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: friend-service
  namespace: boilerplate-random
spec:
  selector:
    app: friend-service
  ports:
    - name: http
      port: 24611
      targetPort: http
    - name: grpc
      port: 29921
      targetPort: grpc
