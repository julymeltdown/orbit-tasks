apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbit-web
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orbit-web
  template:
    metadata:
      labels:
        app: orbit-web
    spec:
      containers:
        - name: orbit-web
          image: ${ORBIT_WEB_IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: orbit-web
  namespace: boilerplate-random
spec:
  type: NodePort
  selector:
    app: orbit-web
  ports:
    - name: http
      port: 28139
      targetPort: http
      nodePort: 32436
