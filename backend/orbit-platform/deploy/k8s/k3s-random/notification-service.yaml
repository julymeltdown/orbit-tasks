apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ${NOTIFICATION_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: SERVER_PORT
              value: "24134"
            - name: GRPC_SERVER_PORT
              value: "29134"
            - name: AUTH_JWKS_URL
              value: http://auth-service:24131/.well-known/jwks.json
            - name: SECURITY_INTERNAL_SERVICE_TOKEN
              value: internal-service-token
          ports:
            - name: http
              containerPort: 24134
            - name: grpc
              containerPort: 29134
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: boilerplate-random
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 24134
      targetPort: http
    - name: grpc
      port: 29134
      targetPort: grpc
