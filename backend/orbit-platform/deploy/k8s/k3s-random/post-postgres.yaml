apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: post-postgres-data
  namespace: boilerplate-random
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-postgres
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: post-postgres
  template:
    metadata:
      labels:
        app: post-postgres
    spec:
      containers:
        - name: post-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: post_db
            - name: POSTGRES_USER
              value: post_user
            - name: POSTGRES_PASSWORD
              value: post_pass
            - name: PGPORT
              value: "24177"
          ports:
            - name: postgres
              containerPort: 24177
          volumeMounts:
            - name: post-postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U post_user -d post_db -p 24177"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U post_user -d post_db -p 24177"]
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: post-postgres-data
          persistentVolumeClaim:
            claimName: post-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: post-postgres
  namespace: boilerplate-random
spec:
  selector:
    app: post-postgres
  ports:
    - name: postgres
      port: 24177
      targetPort: postgres
