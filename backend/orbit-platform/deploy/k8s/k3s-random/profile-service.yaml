apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: boilerplate-random
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
        - name: profile-service
          image: ${PROFILE_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: PROFILE_SEED_ENABLED
              value: "true"
            - name: PROFILE_SEED_RESET
              value: "true"
            - name: SERVER_PORT
              value: "23369"
            - name: GRPC_SERVER_PORT
              value: "27183"
            - name: AUTH_JWKS_URL
              value: http://auth-service:21937/.well-known/jwks.json
          ports:
            - name: http
              containerPort: 23369
            - name: grpc
              containerPort: 27183
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: profile-service
  namespace: boilerplate-random
spec:
  selector:
    app: profile-service
  ports:
    - name: http
      port: 23369
      targetPort: http
    - name: grpc
      port: 27183
      targetPort: grpc
