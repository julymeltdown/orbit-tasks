syntax = "proto3";

package orbit.agile.v1;

option java_package = "com.orbit.agile.v1";
option java_multiple_files = true;

service AgileOps {
  rpc SubmitDsu(SubmitDsuRequest) returns (SubmitDsuResponse);
}

message SubmitDsuRequest {
  string workspace_id = 1;
  string sprint_id = 2;
  string author_id = 3;
  string raw_text = 4;
}

message SubmitDsuResponse {
  string dsu_entry_id = 1;
  int32 blocker_count = 2;
}
