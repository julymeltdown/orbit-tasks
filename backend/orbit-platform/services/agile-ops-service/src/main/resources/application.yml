spring:
  application:
    name: agile-ops-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agile_ops_db}
    username: ${DB_USERNAME:agile_ops_user}
    password: ${DB_PASSWORD:agile_ops_pass}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  grpc:
    server:
      port: ${GRPC_SERVER_PORT:9096}
      reflection:
        enabled: true
      health:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
