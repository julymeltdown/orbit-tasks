version: 1
recipes:
  - id: my-work-home
    description: Aggregate tasks, unread notifications, and active mentions for app shell home.
    timeoutMs: 1200
    cacheTtlMs: 15000
    fanout:
      - service: workgraph-service
        operation: listAssignedWorkItems
      - service: notification-service
        operation: listUnreadInbox
      - service: collaboration-service
        operation: listOpenMentions
  - id: thread-context
    description: Compose thread messages, mention targets, and inbox triage metadata.
    timeoutMs: 900
    cacheTtlMs: 5000
    fanout:
      - service: collaboration-service
        operation: getThread
      - service: collaboration-service
        operation: listInboxByUser
      - service: profile-service
        operation: batchGetProfiles
      - service: workgraph-service
        operation: getWorkItemSummary
  - id: schedule-health-overview
    description: Merge deterministic metrics with AI advisory summary.
    timeoutMs: 1800
    cacheTtlMs: 30000
    fanout:
      - service: schedule-intelligence-service
        operation: evaluateSchedule
      - service: agile-ops-service
        operation: getSprintSignals
      - service: workgraph-service
        operation: getDependencyHealth
