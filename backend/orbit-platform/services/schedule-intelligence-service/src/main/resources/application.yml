spring:
  application:
    name: schedule-intelligence-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/schedule_intel_db}
    username: ${DB_USERNAME:schedule_intel_user}
    password: ${DB_PASSWORD:schedule_intel_pass}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
  grpc:
    server:
      port: ${GRPC_SERVER_PORT:9099}
      reflection:
        enabled: true

orbit:
  ai:
    model: ${ORBIT_AI_MODEL:gpt-5.2-pro}
    timeout-ms: ${ORBIT_AI_TIMEOUT_MS:45000}
    fallback-confidence-threshold: ${ORBIT_AI_FALLBACK_THRESHOLD:0.55}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:${ORBIT_OPENAI_API_KEY:}}
      store: ${OPENAI_STORE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
