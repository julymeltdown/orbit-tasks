syntax = "proto3";

package post.v1;

option java_multiple_files = true;
option java_package = "com.example.post.v1";
option java_outer_classname = "PostProto";

message Post {
  string id = 1; // UUID
  string author_id = 2; // UUID
  string content = 3;
  string visibility = 4; // PUBLIC, FRIENDS, PRIVATE
  string created_at = 5; // RFC3339
  int64 comment_count = 6;
  int64 like_count = 7;
  bool liked_by_me = 8;
}

message Comment {
  string id = 1; // UUID
  string post_id = 2; // UUID
  string author_id = 3; // UUID
  string content = 4;
  string created_at = 5; // RFC3339
}

message CreatePostRequest {
  string author_id = 1; // UUID
  string content = 2;
  string visibility = 3;
}

message CreatePostResponse {
  Post post = 1;
}

message CreateCommentRequest {
  string post_id = 1; // UUID
  string author_id = 2; // UUID
  string content = 3;
}

message CreateCommentResponse {
  Comment comment = 1;
}

message FeedRequest {
  string user_id = 1; // UUID
  string cursor = 2;
  int32 limit = 3;
}

message AuthorPostsRequest {
  string author_id = 1; // UUID
  string cursor = 2;
  int32 limit = 3;
  string viewer_id = 4; // UUID
}

message SearchPostsRequest {
  string query = 1;
  string cursor = 2;
  int32 limit = 3;
  string viewer_id = 4; // UUID
}

message GetPostRequest {
  string post_id = 1; // UUID
  string viewer_id = 2; // UUID
}

message GetPostResponse {
  Post post = 1;
  repeated Comment comments = 2;
}

message FeedResponse {
  repeated Post posts = 1;
  string next_cursor = 2;
}

message LikePostRequest {
  string post_id = 1; // UUID
  string user_id = 2; // UUID
}

message LikePostResponse {
  string post_id = 1; // UUID
  int64 like_count = 2;
  bool liked = 3;
}

message UnlikePostRequest {
  string post_id = 1; // UUID
  string user_id = 2; // UUID
}

message UnlikePostResponse {
  string post_id = 1; // UUID
  int64 like_count = 2;
  bool liked = 3;
}

message TrendingRequest {
  string viewer_id = 1; // UUID
  string cursor = 2;
  int32 limit = 3;
}

service PostService {
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
  rpc GetFeed(FeedRequest) returns (FeedResponse);
  rpc GetAuthorPosts(AuthorPostsRequest) returns (FeedResponse);
  rpc SearchPosts(SearchPostsRequest) returns (FeedResponse);
  rpc GetPost(GetPostRequest) returns (GetPostResponse);
  rpc LikePost(LikePostRequest) returns (LikePostResponse);
  rpc UnlikePost(UnlikePostRequest) returns (UnlikePostResponse);
  rpc GetTrending(TrendingRequest) returns (FeedResponse);
}
