openapi: 3.0.3
info:
  title: JWT MSA API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /auth/signup/email:
    post:
      summary: Start email signup and send verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupEmailRequest'
      responses:
        '202':
          description: Verification code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationPendingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/signup/email/verify:
    post:
      summary: Verify email code and complete signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified and tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/password/reset/request:
    post:
      summary: Request password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Reset link dispatched (always returns success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/password/reset/confirm:
    post:
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password reset completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/refresh:
    post:
      summary: Reissue access/refresh token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens reissued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout complete
  /auth/jwks:
    get:
      summary: JWKS for JWT verification
      responses:
        '200':
          description: JWKS
          content:
            application/json:
              schema:
                type: object
  /auth/oauth/{provider}/authorize:
    get:
      summary: Start OAuth authorization
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProvider'
      responses:
        '302':
          description: Redirect to provider
  /auth/oauth/{provider}/callback:
    get:
      summary: OAuth callback
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProvider'
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/oauth/{provider}/link:
    post:
      summary: Link OAuth provider to existing account
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProvider'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthLinkRequest'
      responses:
        '200':
          description: Provider linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkedProvidersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /profiles/{userId}:
    get:
      summary: Get user profile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update user profile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
  /posts:
    post:
      summary: Create a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
  /posts/feed:
    get:
      summary: Read feed
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Feed page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
  /posts/{postId}/comments:
    post:
      summary: Add a comment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
  /friends/requests:
    post:
      summary: Send friend request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendRequestCreate'
      responses:
        '201':
          description: Friend request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequest'
  /friends/requests/{requestId}/accept:
    post:
      summary: Accept friend request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequest'
  /friends/requests/{requestId}/reject:
    post:
      summary: Reject friend request
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequest'
  /friends:
    get:
      summary: List friends
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Friend list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendList'
  /friends/{friendId}:
    delete:
      summary: Remove friend
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: friendId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        '204':
          description: Friend removed
  /notifications:
    get:
      summary: List notifications
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'
  /notifications/{notificationId}/read:
    post:
      summary: Mark notification as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: notificationId
          required: true
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    OAuthProvider:
      type: string
      enum: [GOOGLE, APPLE]
    SignupEmailRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 72
    VerifyEmailRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6
    VerificationPendingResponse:
      type: object
      properties:
        message:
          type: string
        expires_at:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetConfirmRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 128
    PasswordResetResponse:
      type: object
      properties:
        status:
          type: string
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    OAuthLinkRequest:
      type: object
      required: [code, state]
      properties:
        code:
          type: string
        state:
          type: string
    AuthResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
    LinkedProvidersResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        linked_providers:
          type: array
          items:
            $ref: '#/components/schemas/OAuthProvider'
    Profile:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_url:
          type: string
        bio:
          type: string
        follower_count:
          type: integer
        following_count:
          type: integer
        post_count:
          type: integer
    ProfileUpdateRequest:
      type: object
      properties:
        nickname:
          type: string
        avatar_url:
          type: string
        bio:
          type: string
    CreatePostRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        visibility:
          type: string
          enum: [PUBLIC, FRIENDS, PRIVATE]
    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        content:
          type: string
        visibility:
          type: string
        created_at:
          type: string
          format: date-time
    PostPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        next_cursor:
          type: string
    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        post_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        content:
          type: string
        created_at:
          type: string
          format: date-time
    FriendRequestCreate:
      type: object
      required: [target_user_id]
      properties:
        target_user_id:
          type: string
          format: uuid
    FriendRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        requester_id:
          type: string
          format: uuid
        addressee_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [REQUESTED, ACCEPTED, REJECTED, CANCELED, BLOCKED]
    FriendList:
      type: object
      properties:
        friends:
          type: array
          items:
            type: string
            format: uuid
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
        payload:
          type: object
        read_at:
          type: string
          format: date-time
    NotificationPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        next_cursor:
          type: string
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
