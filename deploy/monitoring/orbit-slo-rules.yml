groups:
  - name: orbit-schedule-slos
    interval: 30s
    rules:
      - alert: OrbitApiGatewayHigh5xxRate
        expr: |
          sum(rate(http_server_requests_seconds_count{application="api-gateway",status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count{application="api-gateway"}[5m])) > 0.02
        for: 10m
        labels:
          severity: critical
          service: api-gateway
        annotations:
          summary: "API Gateway 5xx ratio exceeds 2%"
          runbook: "backend/orbit-platform/docs/runbooks/incident-response.md"

      - alert: OrbitAIEvaluationFallbackSpike
        expr: |
          sum(rate(orbit_schedule_evaluation_fallback_total[15m]))
          /
          sum(rate(orbit_schedule_evaluation_requests_total[15m])) > 0.25
        for: 15m
        labels:
          severity: warning
          service: schedule-intelligence-service
        annotations:
          summary: "AI fallback ratio exceeds 25%"
          runbook: "backend/orbit-platform/docs/runbooks/incident-response.md"

      - alert: OrbitDeepLinkAuthBounceAnomaly
        expr: sum(rate(orbit_deeplink_auth_required_total[10m])) > 20
        for: 10m
        labels:
          severity: warning
          service: api-gateway
        annotations:
          summary: "Deep-link auth bounce volume unexpectedly high"
          runbook: "backend/orbit-platform/docs/runbooks/deeplink-abuse-response.md"
