openapi: 3.0.3
info:
  title: Orbit Tasks Gateway v2 Contract
  version: 2.0.0
  description: Public REST contract for Sprint-DSU loop, work item multiview CRUD, collaboration triage, and schedule intelligence.
servers:
  - url: https://tasksapi.infinitefallcult.trade
    description: Production gateway
  - url: http://localhost:8080
    description: Local gateway
paths:
  /api/v2/work-items:
    get:
      summary: List work items
      operationId: listWorkItemsV2
      parameters:
        - in: query
          name: projectId
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: assignee
          schema:
            type: string
        - in: query
          name: query
          schema:
            type: string
      responses:
        "200":
          description: Work item list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkItem"
    post:
      summary: Create work item
      operationId: createWorkItemV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkItemRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItem"
  /api/v2/work-items/dependency-graph:
    get:
      summary: Fetch dependency graph
      operationId: getDependencyGraphV2
      parameters:
        - in: query
          name: projectId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dependency graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyGraph"
  /api/v2/work-items/{workItemId}:
    patch:
      summary: Patch work item
      operationId: patchWorkItemV2
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchWorkItemRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItem"
  /api/v2/work-items/{workItemId}/status:
    patch:
      summary: Patch status only
      operationId: patchWorkItemStatusV2
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItem"
  /api/v2/work-items/{workItemId}/dependencies:
    post:
      summary: Add dependency
      operationId: addDependencyV2
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toWorkItemId]
              properties:
                toWorkItemId:
                  type: string
                  format: uuid
                type:
                  type: string
      responses:
        "200":
          description: Created dependency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyEdge"
  /api/v2/dependencies/{dependencyId}:
    delete:
      summary: Delete dependency
      operationId: deleteDependencyV2
      parameters:
        - in: path
          name: dependencyId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
  /api/v2/work-items/{workItemId}/activity:
    get:
      summary: List work item activity
      operationId: listWorkItemActivityV2
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkItemActivity"
  /api/v2/sprints:
    post:
      summary: Create sprint
      operationId: createSprintV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSprintRequest"
      responses:
        "200":
          description: Sprint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sprint"
  /api/v2/sprints/{sprintId}/backlog-items:
    get:
      summary: List sprint backlog
      operationId: listSprintBacklogV2
      parameters:
        - $ref: "#/components/parameters/SprintId"
      responses:
        "200":
          description: Backlog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BacklogItem"
    post:
      summary: Add sprint backlog item
      operationId: addSprintBacklogItemV2
      parameters:
        - $ref: "#/components/parameters/SprintId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workItemId, rank]
              properties:
                workItemId:
                  type: string
                  format: uuid
                rank:
                  type: integer
                status:
                  type: string
      responses:
        "200":
          description: Backlog item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacklogItem"
  /api/v2/sprints/{sprintId}/day-plan:generate:
    post:
      summary: Generate day plan draft
      operationId: generateDayPlanV2
      parameters:
        - $ref: "#/components/parameters/SprintId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dailyCapacityMinutes:
                  type: integer
                bufferMinutes:
                  type: integer
      responses:
        "200":
          description: Day plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayPlan"
  /api/v2/sprints/{sprintId}/day-plans:
    get:
      summary: List day plans
      operationId: listDayPlansV2
      parameters:
        - $ref: "#/components/parameters/SprintId"
      responses:
        "200":
          description: Day plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayPlan"
  /api/v2/day-plans/{dayPlanId}:
    patch:
      summary: Patch day plan
      operationId: patchDayPlanV2
      parameters:
        - in: path
          name: dayPlanId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plannedMinutes:
                  type: integer
                bufferMinutes:
                  type: integer
                locked:
                  type: boolean
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayPlan"
  /api/v2/sprints/{sprintId}:freeze:
    post:
      summary: Freeze sprint plan
      operationId: freezeSprintV2
      parameters:
        - $ref: "#/components/parameters/SprintId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                freeze:
                  type: boolean
      responses:
        "200":
          description: Sprint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sprint"
  /api/v2/dsu:
    post:
      summary: Create DSU entry
      operationId: createDsuV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDsuRequest"
      responses:
        "200":
          description: DSU entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DsuEntry"
  /api/v2/dsu/{dsuId}:suggest:
    post:
      summary: Generate DSU suggestions
      operationId: suggestDsuV2
      parameters:
        - in: path
          name: dsuId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DsuSuggestion"
  /api/v2/dsu/{dsuId}:apply:
    post:
      summary: Apply approved DSU suggestions
      operationId: applyDsuV2
      parameters:
        - in: path
          name: dsuId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorId, suggestions]
              properties:
                actorId:
                  type: string
                suggestions:
                  type: array
                  items:
                    type: object
                    required: [suggestionId, approved]
                    properties:
                      suggestionId:
                        type: string
                        format: uuid
                      approved:
                        type: boolean
                      overrideChange:
                        type: object
                        additionalProperties: true
      responses:
        "200":
          description: Apply result
          content:
            application/json:
              schema:
                type: object
                properties:
                  dsuId:
                    type: string
                  appliedCount:
                    type: integer
                  skippedCount:
                    type: integer
                  status:
                    type: string
  /api/v2/threads:
    post:
      summary: Create thread
      operationId: createThreadV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, workItemId, title, createdBy]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                workItemId:
                  type: string
                  format: uuid
                title:
                  type: string
                createdBy:
                  type: string
      responses:
        "200":
          description: Thread
  /api/v2/threads/{threadId}/messages:
    get:
      summary: List thread messages
      operationId: listThreadMessagesV2
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Messages
    post:
      summary: Post thread message
      operationId: postThreadMessageV2
      parameters:
        - in: path
          name: threadId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [authorId, body]
              properties:
                authorId:
                  type: string
                body:
                  type: string
      responses:
        "200":
          description: Message
  /api/v2/inbox:
    get:
      summary: List inbox items by filter
      operationId: listInboxV2
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
        - in: query
          name: filter
          schema:
            type: string
            enum: [all, notifications, requests, mentions, ai_questions]
      responses:
        "200":
          description: Inbox items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxItem"
  /api/v2/inbox/{inboxItemId}:
    patch:
      summary: Patch inbox status
      operationId: patchInboxItemV2
      parameters:
        - in: path
          name: inboxItemId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                status:
                  type: string
                note:
                  type: string
      responses:
        "200":
          description: Updated inbox item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxItem"
  /api/v2/teams:
    post:
      summary: Create team
      operationId: createTeamV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, name, createdBy]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                name:
                  type: string
                createdBy:
                  type: string
      responses:
        "200":
          description: Team
  /api/v2/teams/{teamId}/members:
    get:
      summary: List team members
      operationId: listTeamMembersV2
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team members
  /api/v2/teams/{teamId}/invites:
    get:
      summary: List team invites
      operationId: listTeamInvitesV2
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team invites
    post:
      summary: Create team invite
      operationId: inviteTeamMemberV2
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invitee, role, invitedBy]
              properties:
                invitee:
                  type: string
                role:
                  type: string
                invitedBy:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Invite
  /api/v2/teams/{teamId}/members/{userId}:
    patch:
      summary: Patch team member role
      operationId: patchTeamMemberV2
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role, actorRole]
              properties:
                role:
                  type: string
                actorRole:
                  type: string
                note:
                  type: string
      responses:
        "200":
          description: Member
  /api/v2/insights/evaluations:
    post:
      summary: Run schedule evaluation
      operationId: runScheduleEvaluationV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleEvaluationRequest"
      responses:
        "200":
          description: Evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEvaluation"
  /api/v2/insights/evaluations/{evaluationId}/actions:
    post:
      summary: Submit evaluation action
      operationId: submitEvaluationActionV2
      parameters:
        - in: path
          name: evaluationId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                note:
                  type: string
                patch:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Action result

components:
  parameters:
    WorkItemId:
      in: path
      name: workItemId
      required: true
      schema:
        type: string
        format: uuid
    SprintId:
      in: path
      name: sprintId
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    WorkItem:
      type: object
      required: [workItemId, projectId, type, title, status, createdAt, updatedAt]
      properties:
        workItemId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        status:
          type: string
        assignee:
          type: string
          nullable: true
        startAt:
          type: string
          nullable: true
        dueAt:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
        estimateMinutes:
          type: integer
          nullable: true
        actualMinutes:
          type: integer
          nullable: true
        blockedReason:
          type: string
          nullable: true
        markdownBody:
          type: string
          nullable: true
        activityCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateWorkItemRequest:
      type: object
      required: [projectId, type, title]
      properties:
        projectId:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        assignee:
          type: string
        startAt:
          type: string
        dueAt:
          type: string
        priority:
          type: string
        estimateMinutes:
          type: integer
        actualMinutes:
          type: integer
        blockedReason:
          type: string
        markdownBody:
          type: string
    PatchWorkItemRequest:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: string
        assignee:
          type: string
          nullable: true
        startAt:
          type: string
          nullable: true
        dueAt:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
        estimateMinutes:
          type: integer
          nullable: true
        actualMinutes:
          type: integer
          nullable: true
        blockedReason:
          type: string
          nullable: true
        markdownBody:
          type: string
          nullable: true
    DependencyEdge:
      type: object
      properties:
        dependencyId:
          type: string
        fromWorkItemId:
          type: string
        toWorkItemId:
          type: string
        type:
          type: string
        createdAt:
          type: string
    DependencyGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            properties:
              workItemId:
                type: string
              title:
                type: string
              status:
                type: string
              upstreamCount:
                type: integer
              downstreamCount:
                type: integer
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"
    WorkItemActivity:
      type: object
      properties:
        activityId:
          type: string
        workItemId:
          type: string
        action:
          type: string
        actorId:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
    Sprint:
      type: object
      properties:
        sprintId:
          type: string
        workspaceId:
          type: string
        projectId:
          type: string
        name:
          type: string
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        capacitySp:
          type: integer
        status:
          type: string
        freezeState:
          type: boolean
        dailyCapacityMinutes:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateSprintRequest:
      type: object
      required: [workspaceId, projectId, name, goal, startDate, endDate, capacitySp]
      properties:
        workspaceId:
          type: string
        projectId:
          type: string
        name:
          type: string
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        capacitySp:
          type: integer
        dailyCapacityMinutes:
          type: integer
    BacklogItem:
      type: object
      properties:
        backlogItemId:
          type: string
        sprintId:
          type: string
        workItemId:
          type: string
        rank:
          type: integer
        status:
          type: string
        createdAt:
          type: string
    DayPlan:
      type: object
      properties:
        dayPlanId:
          type: string
        sprintId:
          type: string
        day:
          type: string
          format: date
        locked:
          type: boolean
        plannedMinutes:
          type: integer
        bufferMinutes:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              dayPlanItemId:
                type: string
              dayPlanId:
                type: string
              workItemId:
                type: string
              plannedMinutes:
                type: integer
              orderIndex:
                type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateDsuRequest:
      type: object
      required: [workspaceId, projectId, authorId, rawText]
      properties:
        workspaceId:
          type: string
        projectId:
          type: string
        sprintId:
          type: string
        authorId:
          type: string
        rawText:
          type: string
    DsuEntry:
      type: object
      properties:
        dsuId:
          type: string
        workspaceId:
          type: string
        projectId:
          type: string
        sprintId:
          type: string
        authorId:
          type: string
        rawText:
          type: string
        createdAt:
          type: string
    DsuSuggestion:
      type: object
      properties:
        suggestionId:
          type: string
        dsuId:
          type: string
        targetType:
          type: string
        targetId:
          type: string
        proposedChange:
          type: object
          additionalProperties: true
        confidence:
          type: number
        reason:
          type: string
        approved:
          type: boolean
    InboxItem:
      type: object
      properties:
        inboxItemId:
          type: string
        userId:
          type: string
        kind:
          type: string
        sourceType:
          type: string
        sourceId:
          type: string
        messageId:
          type: string
        read:
          type: boolean
        status:
          type: string
        createdAt:
          type: string
        resolvedAt:
          type: string
          nullable: true
    ScheduleEvaluationRequest:
      type: object
      required: [workspaceId, projectId, remainingStoryPoints, availableCapacitySp, blockedCount, atRiskCount]
      properties:
        workspaceId:
          type: string
        projectId:
          type: string
        sprintId:
          type: string
        selectedWorkItemId:
          type: string
        prompt:
          type: string
        remainingStoryPoints:
          type: integer
        availableCapacitySp:
          type: integer
        blockedCount:
          type: integer
        atRiskCount:
          type: integer
        simulateAiFailure:
          type: boolean
    ScheduleEvaluation:
      type: object
      properties:
        evaluationId:
          type: string
        health:
          type: string
        topRisks:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              summary:
                type: string
              impact:
                type: string
              recommendedActions:
                type: array
                items:
                  type: string
              evidence:
                type: array
                items:
                  type: string
        questions:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: object
            properties:
              actionId:
                type: string
              label:
                type: string
              status:
                type: string
              note:
                type: string
        confidence:
          type: number
        fallback:
          type: boolean
        reason:
          type: string
