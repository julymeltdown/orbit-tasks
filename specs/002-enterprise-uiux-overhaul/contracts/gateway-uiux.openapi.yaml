openapi: 3.0.3
info:
  title: Orbit Schedule UI/UX Gateway Contract
  version: 0.1.0
  description: >
    Canonical public REST contract for the UI/UX re-architecture.
    This contract defines scope navigation, project view parity, sprint/DSU loop,
    collaboration inbox, and schedule evaluation APIs.
servers:
  - url: https://tasksapi.infinitefallcult.trade
    description: Public production gateway
  - url: http://localhost:8080
    description: Local gateway
paths:
  /api/workspaces/me:
    get:
      summary: List workspaces available to current user
      operationId: listMyWorkspaces
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceSummary"
  /api/workspaces:
    post:
      summary: Create workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
  /api/workspaces/{workspaceId}/members/invitations:
    post:
      summary: Invite workspace member
      operationId: inviteWorkspaceMember
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "202":
          description: Invitation accepted
  /api/projects:
    get:
      summary: List projects in workspace
      operationId: listProjects
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectSummary"
    post:
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
  /api/projects/{projectId}/view-configurations:
    get:
      summary: List saved view configurations
      operationId: listViewConfigurations
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: View configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ViewConfiguration"
    post:
      summary: Create view configuration
      operationId: createViewConfiguration
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewConfigurationUpsertRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewConfiguration"
  /api/work-items:
    get:
      summary: List work items
      operationId: listWorkItems
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: view
          in: query
          required: false
          schema:
            type: string
            enum: [BOARD, TABLE, TIMELINE, CALENDAR, DASHBOARD]
      responses:
        "200":
          description: Work item list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkItem"
    post:
      summary: Create work item
      operationId: createWorkItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkItemRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItem"
  /api/work-items/dependency-graph:
    get:
      summary: Fetch dependency graph for active project scope
      operationId: dependencyGraph
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dependency graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyGraph"
  /api/work-items/{workItemId}:
    patch:
      summary: Update work item
      operationId: patchWorkItem
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchWorkItemRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItem"
  /api/work-items/bulk:
    patch:
      summary: Bulk update work items
      operationId: bulkPatchWorkItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPatchWorkItemsRequest"
      responses:
        "200":
          description: Bulk mutation result
  /api/work-items/{workItemId}/dependencies:
    post:
      summary: Create dependency
      operationId: createDependency
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDependencyRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dependency"
  /api/work-items/{workItemId}/dependencies/{dependencyId}:
    delete:
      summary: Delete dependency
      operationId: deleteDependency
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
        - name: dependencyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
  /api/sprints/active:
    get:
      summary: Get active sprint for workspace/project
      operationId: getActiveSprint
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: projectId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Active sprint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SprintSummary"
        "404":
          description: No active sprint
  /api/dsu-extractions:
    post:
      summary: Extract structured DSU signals
      operationId: extractDsuSignals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DsuExtractionRequest"
      responses:
        "200":
          description: DSU extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DsuSignal"
  /api/collaboration/inbox:
    get:
      summary: List collaboration inbox items
      operationId: listInboxItems
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [ALL, NOTIFICATION, REQUEST, MENTION, AI_QUESTION]
      responses:
        "200":
          description: Inbox list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxItem"
  /api/collaboration/inbox/{itemId}/resolve:
    post:
      summary: Resolve inbox item
      operationId: resolveInboxItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveInboxItemRequest"
      responses:
        "200":
          description: Resolved
  /api/insights/schedule-evaluations:
    post:
      summary: Run schedule evaluation
      operationId: createScheduleEvaluation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleEvaluationRequest"
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEvaluation"
  /api/insights/schedule-evaluations/{evaluationId}:
    get:
      summary: Get schedule evaluation detail
      operationId: getScheduleEvaluation
      parameters:
        - name: evaluationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evaluation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEvaluation"
  /api/insights/schedule-evaluations/actions:
    post:
      summary: Record action taken on evaluation
      operationId: recordEvaluationAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationActionRequest"
      responses:
        "200":
          description: Action accepted
  /api/portfolio/list:
    get:
      summary: List portfolios by workspace
      operationId: listPortfolios
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Portfolio list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioListItem"
    post:
      summary: Create portfolio
      operationId: createPortfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortfolioRequest"
      responses:
        "201":
          description: Portfolio created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioListItem"
components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkItemId:
      name: workItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    WorkspaceSummary:
      type: object
      required: [workspaceId, name, role, defaultWorkspace]
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
        defaultWorkspace:
          type: boolean
    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
    ProjectSummary:
      type: object
      required: [projectId, workspaceId, name, status]
      properties:
        projectId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
    CreateProjectRequest:
      type: object
      required: [workspaceId, name]
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
    ViewConfiguration:
      type: object
      required: [viewConfigId, projectId, viewType, filters]
      properties:
        viewConfigId:
          type: string
        projectId:
          type: string
          format: uuid
        viewType:
          type: string
        filters:
          type: object
          additionalProperties: true
        sort:
          type: object
          additionalProperties: true
        groupBy:
          type: string
          nullable: true
        isDefault:
          type: boolean
    ViewConfigurationUpsertRequest:
      type: object
      required: [viewType, filters]
      properties:
        viewType:
          type: string
        filters:
          type: object
          additionalProperties: true
        sort:
          type: object
          additionalProperties: true
        groupBy:
          type: string
          nullable: true
        isDefault:
          type: boolean
    DependencyGraph:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/DependencyNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"
    DependencyNode:
      type: object
      required: [workItemId, status]
      properties:
        workItemId:
          type: string
          format: uuid
        status:
          type: string
    DependencyEdge:
      type: object
      required: [fromWorkItemId, toWorkItemId]
      properties:
        fromWorkItemId:
          type: string
          format: uuid
        toWorkItemId:
          type: string
          format: uuid
    PortfolioListItem:
      type: object
      required: [portfolioId, name, status, projectCount, updatedAt]
      properties:
        portfolioId:
          type: string
        name:
          type: string
        status:
          type: string
        projectCount:
          type: integer
        updatedAt:
          type: string
    CreatePortfolioRequest:
      type: object
      required: [workspaceId, name]
      properties:
        workspaceId:
          type: string
        name:
          type: string
    WorkItem:
      type: object
      required: [workItemId, projectId, title, type, status, priority]
      properties:
        workItemId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
        status:
          type: string
        priority:
          type: string
        assigneeId:
          type: string
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
    CreateWorkItemRequest:
      type: object
      required: [projectId, title, type]
      properties:
        projectId:
          type: string
          format: uuid
        title:
          type: string
        type:
          type: string
        priority:
          type: string
        assigneeId:
          type: string
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
    PatchWorkItemRequest:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
        priority:
          type: string
        assigneeId:
          type: string
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
    BulkPatchWorkItemsRequest:
      type: object
      required: [itemIds, patch]
      properties:
        itemIds:
          type: array
          items:
            type: string
            format: uuid
        patch:
          type: object
          additionalProperties: true
    CreateDependencyRequest:
      type: object
      required: [toWorkItemId]
      properties:
        toWorkItemId:
          type: string
          format: uuid
        type:
          type: string
    Dependency:
      type: object
      required: [dependencyId, fromWorkItemId, toWorkItemId, type]
      properties:
        dependencyId:
          type: string
          format: uuid
        fromWorkItemId:
          type: string
          format: uuid
        toWorkItemId:
          type: string
          format: uuid
        type:
          type: string
    SprintSummary:
      type: object
      required: [sprintId, projectId, name, goal, startDate, endDate, status]
      properties:
        sprintId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        name:
          type: string
        goal:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
    DsuExtractionRequest:
      type: object
      required: [workspaceId, projectId, rawText]
      properties:
        workspaceId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        sprintId:
          type: string
          format: uuid
          nullable: true
        rawText:
          type: string
    DsuSignal:
      type: object
      required: [blockers, asks, confidence]
      properties:
        blockers:
          type: array
          items:
            type: object
            additionalProperties: true
        asks:
          type: array
          items:
            type: string
        linkedWorkItemIds:
          type: array
          items:
            type: string
            format: uuid
        confidence:
          type: number
    InboxItem:
      type: object
      required: [inboxItemId, kind, status, title, deepLink]
      properties:
        inboxItemId:
          type: string
          format: uuid
        kind:
          type: string
        status:
          type: string
        title:
          type: string
        summary:
          type: string
        deepLink:
          type: string
    ResolveInboxItemRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [READ, RESOLVED]
        note:
          type: string
          nullable: true
    ScheduleEvaluationRequest:
      type: object
      required: [workspaceId, projectId]
      properties:
        workspaceId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        sprintId:
          type: string
          format: uuid
          nullable: true
        simulateAiFailure:
          type: boolean
    ScheduleEvaluation:
      type: object
      required: [evaluationId, health, topRisks, questions, confidence, fallback, reason]
      properties:
        evaluationId:
          type: string
        health:
          type: string
        topRisks:
          type: array
          items:
            type: object
            additionalProperties: true
        questions:
          type: array
          items:
            type: string
        confidence:
          type: number
        fallback:
          type: boolean
        reason:
          type: string
    EvaluationActionRequest:
      type: object
      required: [evaluationId, action]
      properties:
        evaluationId:
          type: string
        action:
          type: string
          enum: [accept, dismiss, ask]
        note:
          type: string
          nullable: true
